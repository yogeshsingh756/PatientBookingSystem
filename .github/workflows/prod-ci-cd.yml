name: prod-ci-cd

on:
  push:
    branches:
      - prod
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore PatientBookingSystem.API/PatientBookingSystem.API.csproj

      - name: Build
        run: dotnet build PatientBookingSystem.API/PatientBookingSystem.API.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test PatientBookingSystem.API/PatientBookingSystem.API.csproj --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish PatientBookingSystem.API/PatientBookingSystem.API.csproj -c Release -o publish --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish
          path: publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: publish
          path: publish

      - name: Check deploy secrets
        id: config
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          VPS_RESTART_CMD: ${{ secrets.VPS_RESTART_CMD }}
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_USER" ] && [ -n "$VPS_SSH_KEY" ] && [ -n "$VPS_PATH" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        if: steps.config.outputs.enabled == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s
' "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync files to server
        if: steps.config.outputs.enabled == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          scp -i ~/.ssh/id_rsa -r publish/* "$VPS_USER@$VPS_HOST:$VPS_PATH/"

      - name: Restart app
        if: steps.config.outputs.enabled == 'true' && secrets.VPS_RESTART_CMD != ''
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_RESTART_CMD: ${{ secrets.VPS_RESTART_CMD }}
        run: |
          ssh -i ~/.ssh/id_rsa "$VPS_USER@$VPS_HOST" "$VPS_RESTART_CMD"
